@if (personalInfo | async; as personalInfo) {
  <div class="topbar">
    <app-chips />
    <app-buttons [buttonsConfig]="buttons" />
    <input
      #templateUploadInput
      type="file"
      accept="application/json,.json"
      hidden
      (change)="onTemplateFileChange($event)"
    />
  </div>

  <div class="main" [@changeLanguage]="languageState">
    <div class="main__content">
      <div class="main__background"></div>
      <div class="main__content-left-side">
        <app-personal-data
          [personalInfo]="personalInfo.info"
          [isEditing]="isEditingTemplate"
          (infoChange)="updateUserInfo($event)"
        />
        @if (!isEditingTemplate) {
          <app-section
            heading="SECTIONS.SPECIALIZATION"
            [data]="personalInfo.specializations"
            [whiteColor]="true"
          />
        } @else {
          <app-specializations
            [data]="personalInfo.specializations"
            [isEditing]="isEditingTemplate"
            (dataChange)="updateSection('specializations', $event)"
          />
        }
      </div>

      <app-user
        class="main__content--user"
        [info]="personalInfo.info"
        [isEditing]="isEditingTemplate"
        (infoChange)="updateUserInfo($event)"
      />

      <div class="main__content-right-side">
        <app-section
          heading="SECTIONS.EXPERIENCE"
          [data]="personalInfo.experience"
          [isEditing]="isEditingTemplate"
          (dataChange)="updateSection('experience', $event)"
        />
        <app-section
          heading="SECTIONS.EDUCATION"
          [data]="personalInfo.education"
          [isEditing]="isEditingTemplate"
          (dataChange)="updateSection('education', $event)"
        />
      </div>
    </div>
    <div class="main__footer">
      @if (isEditingTemplate) {
        <textarea
          class="main__footer-input"
          [value]="personalInfo.clause"
          (input)="updateClause($any($event.target).value)"
          placeholder="Podaj tresc zgody RODO"
        ></textarea>
      } @else {
        {{ personalInfo.clause }}
      }
    </div>
  </div>
}
